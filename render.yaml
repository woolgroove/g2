# Render Blueprint：通过环境变量注入 config.yaml（无需 bind mount）。
# 免费实例：不挂持久磁盘，数据库使用外部 Postgres（DSN 写在 config.yaml 里）。
# 把本仓库推到 GitHub 后在 Render 导入即可；或在 Render 控制台手动建 Web Service。
services:
  - type: web
    name: grok2api
    runtime: docker
    plan: free
    # 使用本仓库的 Dockerfile 自行构建（官方镜像无法在无 bind mount 平台启动）。
    dockerfilePath: ./Dockerfile
    # 官方镜像已用启动参数固定监听 0.0.0.0:8000，这里仅声明端口暴露。
    # 若 Render 未自动识别，请在控制台将 Port 设为 8000。
    healthCheckPath: /healthz
    envVars:
      # 把本地 config.yaml 内容做 base64 后填入（推荐，避免 YAML 转义问题）。
      # 生成（PowerShell）：
      #   [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes((Get-Content -Raw config.yaml)))
      # config.yaml 内 database.driver 需设为 postgres，dsn 填外部 Postgres 连接串。
      - key: GROK2API_CONFIG_BASE64
        sync: false
